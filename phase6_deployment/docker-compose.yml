# Phase 6 — Hospital Deployment
# docker-compose.yml
#
# Services:
#   mosquitto   — MQTT broker (sensors → backend)
#   backend     — FastAPI ML server
#   dashboard   — Nginx serving the web dashboard
#
# Usage:
#   docker-compose up -d          (start all)
#   docker-compose logs -f        (view logs)
#   docker-compose down           (stop)

version: "3.9"

services:

  # ── MQTT Broker ──────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: dt_mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"     # MQTT (sensor devices on hospital LAN)
      - "9001:9001"     # MQTT over WebSocket (browser clients)
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    networks:
      - dt_net

  # ── FastAPI ML Backend ───────────────────────────────────
  backend:
    build:
      context: ../phase3_backend
      dockerfile: Dockerfile
    container_name: dt_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - LOG_LEVEL=info
    depends_on:
      - mosquitto
    volumes:
      - ../phase3_backend/models:/app/models:ro
    networks:
      - dt_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Web Dashboard (Nginx) ────────────────────────────────
  dashboard:
    image: nginx:alpine
    container_name: dt_dashboard
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../phase4_unity/web_dashboard:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - dt_net

networks:
  dt_net:
    driver: bridge
